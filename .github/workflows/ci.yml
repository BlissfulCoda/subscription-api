name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  check:
    runs-on: ubuntu-latest
    env:
      # Repository Variables and/or Secrets (Settings → Secrets and variables → Actions).
      # Prefer Secrets for URLs that include credentials; Variables are fine for public pooler URLs.
      DATABASE_URL: ${{ secrets.DATABASE_URL || vars.DATABASE_URL }}
      DIRECT_URL: ${{ secrets.DIRECT_URL || vars.DIRECT_URL || secrets.DATABASE_URL || vars.DATABASE_URL }}
    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4
        with:
          version: 10

      - uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: "pnpm"

      - run: pnpm install

      - name: Prisma validate
        run: pnpm exec prisma validate

      - name: Prisma generate
        run: pnpm exec prisma generate

      - run: pnpm run typecheck

      - run: pnpm run lint

      - run: pnpm test
